<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực OTP - TGDD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f4f4; font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        .otp-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        .otp-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #c92127, #e67e22);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            animation: pulse 2s infinite;
        }
        .otp-icon i { color: white; font-size: 36px; }

        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(201,33,39,0.3); }
            50% { box-shadow: 0 0 0 15px rgba(201,33,39,0); }
        }

        .otp-title { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 8px; }
        .otp-subtitle { font-size: 14px; color: #888; margin-bottom: 30px; }
        .email-highlight { color: #c92127; font-weight: bold; }

        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .otp-digit {
            width: 52px; height: 60px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            outline: none;
            transition: all 0.2s;
            color: #333;
        }
        .otp-digit:focus { border-color: #c92127; box-shadow: 0 0 0 3px rgba(201,33,39,0.1); }

        input[name="otp"] { display: none; } /* hidden real input */

        .btn-verify {
            background: #c92127;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-verify:hover { background: #a01b20; transform: translateY(-2px); }

        .btn-back {
            display: block;
            margin-top: 15px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }
        .btn-back:hover { color: #333; }

        .timer-text { font-size: 13px; color: #aaa; margin-top: 15px; }
        .timer-text span { color: #c92127; font-weight: bold; }

        .discount-info {
            background: #e8f5e9;
            border: 1px solid #4caf50;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 25px;
            font-size: 13px;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <div class="otp-card">
        <div class="otp-icon">
            <i class="fas fa-lock"></i>
        </div>

        <div class="otp-title">Xác thực OTP</div>
        <div class="otp-subtitle">
            Mã OTP 6 số đã được gửi tới<br>
            <span class="email-highlight" th:text="${user.email}">email@...</span>
        </div>

        <!-- Alerts -->
        <div th:if="${error}" class="alert alert-danger" style="font-size: 14px; border-radius: 8px;">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>
        <div th:if="${success}" class="alert alert-success" style="font-size: 14px; border-radius: 8px;">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <div class="discount-info">
            <i class="fas fa-gift"></i>
            Bạn đang đổi <strong th:text="${redeemPairs * 2}">0</strong> điểm →
            giảm <strong th:text="${#numbers.formatDecimal(redeemPairs * 15000, 0, 'COMMA', 0, 'POINT')} + '₫'">0₫</strong>
        </div>

        <form th:action="@{/points/confirm}" method="post" id="otpForm">
            <input type="hidden" name="redeemPairs" th:value="${redeemPairs}">
            <input type="hidden" name="otp" id="otpHidden">

            <div class="otp-inputs">
                <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric">
                <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric">
                <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric">
                <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric">
                <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric">
                <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric">
            </div>

            <div class="timer-text">
                Mã hết hạn sau <span id="timer">5:00</span>
            </div>

            <button type="submit" class="btn-verify" style="margin-top: 20px;" onclick="return combineOtp()">
                <i class="fas fa-check-circle"></i> Xác nhận đổi điểm
            </button>
        </form>

        <a href="/points/redeem" class="btn-back">
            <i class="fas fa-arrow-left"></i> Quay lại & gửi lại OTP
        </a>
    </div>

    <script>
        // Auto-focus next digit
        const digits = document.querySelectorAll('.otp-digit');
        digits.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const val = e.target.value;
                if (val && !/^[0-9]$/.test(val)) {
                    e.target.value = '';
                    return;
                }
                if (val && index < digits.length - 1) {
                    digits[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    digits[index - 1].focus();
                }
            });
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
                [...paste].slice(0, 6).forEach((char, i) => {
                    if (digits[i]) digits[i].value = char;
                });
                if (digits[Math.min(paste.length, digits.length - 1)]) {
                    digits[Math.min(paste.length, digits.length - 1)].focus();
                }
            });
        });

        // Auto-focus first
        if (digits[0]) digits[0].focus();

        function combineOtp() {
            const otp = [...digits].map(d => d.value).join('');
            if (otp.length < 6) {
                alert('Vui lòng nhập đủ 6 chữ số OTP!');
                return false;
            }
            document.getElementById('otpHidden').value = otp;
            return true;
        }

        // Countdown timer 5 min
        let seconds = 300;
        const timerEl = document.getElementById('timer');
        const interval = setInterval(() => {
            seconds--;
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            timerEl.textContent = m + ':' + String(s).padStart(2, '0');
            if (seconds <= 0) {
                clearInterval(interval);
                timerEl.textContent = 'Hết hạn';
                timerEl.style.color = '#999';
            }
        }, 1000);
    </script>
</body>
</html>
