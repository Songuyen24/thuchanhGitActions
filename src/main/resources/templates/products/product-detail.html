<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - Thế Giới Di Động'">Chi tiết sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        /* Top Red Banner */
        .top-banner {
            background: linear-gradient(180deg, #c92127 0%, #d32f2f 100%);
            padding: 8px 0;
            text-align: center;
        }

        .top-banner img {
            max-height: 40px;
        }

        /* Main Header */
        .main-header {
            background: #ffd400;
            /* TGDĐ Yellow */
            padding: 10px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 0 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #000;
        }

        .logo i {
            font-size: 30px;
        }

        .logo span {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .header-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #333;
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 6px;
        }

        .header-btn i {
            font-size: 20px;
            margin-bottom: 2px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background: #d70018;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 1px 5px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
            border: 1px solid #fff;
        }

        /* Product Detail Layout */
        .detail-container {
            max-width: 1200px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            gap: 40px;
        }

        .detail-image {
            flex: 1;
            text-align: center;
        }

        .detail-image img {
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
        }

        .detail-info {
            flex: 1.5;
        }

        .product-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .product-category {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            display: inline-block;
            background: #f1f1f1;
            padding: 5px 12px;
            border-radius: 15px;
        }

        .product-price {
            font-size: 32px;
            color: #c92127;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .product-desc {
            font-size: 15px;
            color: #444;
            line-height: 1.6;
            margin-bottom: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .buy-action {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .btn-buy-now {
            flex: 1;
            background: #c92127;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            text-decoration: none;
            text-align: center;
        }

        .btn-buy-now:hover {
            background: #a61b20;
            color: white;
        }

        .btn-add-cart {
            flex: 1;
            background: white;
            color: #c92127;
            border: 2px solid #c92127;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
        }

        .btn-add-cart:hover {
            background: #fffafa;
            color: #c92127;
        }
    </style>
</head>

<body>
    <!-- Top Promotional Banner Image -->
    <div style="width: 100%; overflow: hidden;">
        <img src="https://cdnv2.tgdd.vn/mwg-static/tgdd/Banner/25/28/2528971e6119a5d6b12f5e9b03c11131.png"
            alt="Banner khuyến mãi" style="width: 100%; display: block; max-height: 80px; object-fit: cover;"
            onerror="this.style.display='none'">
    </div>

    <!-- Main Header -->
    <div class="main-header">
        <div class="header-container">
            <a href="/products" class="logo">
                <i class="fas fa-mobile-alt"></i>
                <span>thegioididong</span>
            </a>

            <div class="header-actions">
                <a sec:authorize="isAnonymous()" href="/login" class="header-btn">
                    <i class="fas fa-user"></i>
                    <span>Đăng nhập</span>
                </a>
                <a href="/cart" class="header-btn">
                    <div style="position: relative; display: flex; align-items: center;">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-count" th:text="${cartCount != null ? cartCount : 0}">0</span>
                    </div>
                    <span style="margin-top: 2px;">Giỏ hàng</span>
                </a>
                <div sec:authorize="isAuthenticated()" style="display: flex; align-items: center; gap: 15px; border-left: 1px solid rgba(0,0,0,0.1); padding-left: 15px; margin-left: 5px;">
                    <div class="header-btn" style="cursor: default; flex-direction: row; gap: 5px;">
                        <i class="fas fa-user-circle" style="color: #333; font-size: 18px;"></i>
                        <span sec:authentication="name" style="color: #333; font-weight: bold; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">User</span>
                    </div>
                    <a href="/logout" class="header-btn" style="color: #c92127; flex-direction: row; gap: 5px;">
                        <i class="fas fa-sign-out-alt" style="font-size: 18px;"></i>
                        <span>Đăng xuất</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Detail View -->
    <div class="detail-container">
        <!-- Image Section -->
        <div class="detail-image">
            <img th:src="${product.imageUrl}" th:alt="${product.name}"
                onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22400%22 height=%22400%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Arial%22 font-size=%2224%22 fill=%22%23999%22%3ENo Image%3C/text%3E%3C/svg%3E'">
        </div>

        <!-- Info Section -->
        <div class="detail-info">
            <h1 class="product-title" th:text="${product.name}">Tên sản phẩm</h1>
            <div class="product-category">
                <i class="fas fa-tag"></i>
                <span th:text="${product.category?.name}">Danh mục</span>
            </div>

            <div th:if="${product.discount != null and product.discount and product.promoPrice != null and product.promoQuantity != null and product.promoQuantity > 0}">
                <div class="product-price" style="display:inline-block; margin-bottom:5px;" th:text="${#numbers.formatDecimal(product.promoPrice, 0, 'COMMA', 0, 'POINT')} + '₫'"></div>
                <span style="text-decoration:line-through; color:#999; font-size:18px; margin-left:12px;" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + '₫'"></span>
                <div style="font-size:14px; font-weight:bold; color:#c92127; background:#ffe6e6; padding:4px 10px; border-radius:4px; display:inline-block; margin-bottom:20px; border: 1px dashed #c92127;">
                    <i class="fas fa-fire"></i> Chỉ còn đúng [[${product.promoQuantity}]] suất giá này!
                </div>
            </div>
            <div th:unless="${product.discount != null and product.discount and product.promoPrice != null and product.promoQuantity != null and product.promoQuantity > 0}">
                <div class="product-price" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + '₫'">0₫</div>
            </div>

            <div class="buy-action">
                <a th:href="@{/cart/add/{id}(id=${product.id})}" class="btn-buy-now">
                    MUA NGAY <br>
                    <small style="font-weight: normal; font-size: 13px;">Giao tận nơi hoặc nhận tại siêu thị</small>
                </a>
                <a th:href="@{/cart/add/{id}(id=${product.id})}" class="btn-add-cart">
                    <i class="fas fa-cart-plus"></i> <br>
                    <small style="font-weight: normal; font-size: 13px;">Thêm vào giỏ</small>
                </a>
            </div>

         <!-- Description Section -->
        <div class="product-description" style="margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px;">
            <h3 style="font-size: 20px; font-weight: bold; margin-bottom: 15px; background: #e0e0e0; display: inline-block; padding: 5px 15px; border-radius: 4px; color: #333;">Mô tả sản phẩm</h3>
            
            <div style="line-height: 1.6; color: #444;" th:if="${product.description != null and !product.description.isEmpty()}" th:utext="${product.description}">
                <!-- Actual description will be injected here -->
            </div>
            
            <div style="line-height: 1.6; color: #888; font-style: italic;" th:if="${product.description == null or product.description.isEmpty()}">
                Mô tả chi tiết sản phẩm sẽ được cập nhật sau...
            </div>
        </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
