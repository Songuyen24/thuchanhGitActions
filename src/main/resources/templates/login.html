<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - TGDĐ Fake</title>
    <!-- Use the same bootstrap as main app -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f1f1f1;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .auth-container {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 25px;
        }
        .auth-logo i {
            font-size: 40px;
            color: #c92127; /* TGDĐ Red */
        }
        .form-control:focus {
            border-color: #ffd400; /* TGDĐ Yellow */
            box-shadow: 0 0 0 0.25rem rgba(255, 212, 0, 0.25);
        }
        .btn-primary {
            background-color: #c92127;
            border-color: #c92127;
            width: 100%;
            padding: 10px;
            font-weight: bold;
        }
        .btn-primary:hover {
            background-color: #a61b20;
            border-color: #a61b20;
        }
        .auth-links {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        .auth-links a {
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-logo">
        <i class="fas fa-shopping-bag"></i>
        <h3>Đăng Nhập</h3>
    </div>

    <div th:if="${param.error}" class="alert alert-danger">
        Sai tên đăng nhập hoặc mật khẩu!
    </div>
    
    <div th:if="${param.success}" class="alert alert-success">
        Đăng ký thành công! Vui lòng đăng nhập.
    </div>

    <form th:action="@{/login-process}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Tên đăng nhập</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>
        </div>
        
        <div class="mb-3">
            <label for="password" class="form-label">Mật khẩu</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary mt-3">Đăng Nhập</button>
    </form>
    
    <div class="auth-links">
        Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
    </div>
</div>

</body>
</html>
