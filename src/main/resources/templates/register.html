<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - TGDĐ Fake</title>
    <!-- Use the same bootstrap as main app -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f1f1f1;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .auth-container {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 25px;
        }
        .auth-logo i {
            font-size: 40px;
            color: #c92127; /* TGDĐ Red */
        }
        .form-control:focus {
            border-color: #ffd400; /* TGDĐ Yellow */
            box-shadow: 0 0 0 0.25rem rgba(255, 212, 0, 0.25);
        }
        .btn-primary {
            background-color: #c92127;
            border-color: #c92127;
            width: 100%;
            padding: 10px;
            font-weight: bold;
        }
        .btn-primary:hover {
            background-color: #a61b20;
            border-color: #a61b20;
        }
        .auth-links {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        .auth-links a {
            color: #007bff;
            text-decoration: none;
        }
        .text-danger {
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-logo">
        <i class="fas fa-user-plus"></i>
        <h3>Đăng Ký Tài Khoản</h3>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${user}" method="post">
        
        <div class="mb-3">
            <label for="username" class="form-label">Tên đăng nhập *</label>
            <input type="text" class="form-control" id="username" th:field="*{username}" required>
            <span class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="password" class="form-label">Mật khẩu *</label>
                <input type="password" class="form-control" id="password" th:field="*{password}" required>
                <span class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>
            <div class="col-md-6 mb-3">
                <label for="email" class="form-label">Email *</label>
                <input type="email" class="form-control" id="email" th:field="*{email}" required>
                <span class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>
        </div>

        <div class="mb-3">
            <label for="phone" class="form-label">Số điện thoại</label>
            <input type="text" class="form-control" id="phone" th:field="*{phone}">
        </div>

        <div class="mb-3">
            <label for="address" class="form-label">Địa chỉ</label>
            <input type="text" class="form-control" id="address" th:field="*{address}">
        </div>
        
        <button type="submit" class="btn btn-primary mt-2">Đăng Ký</button>
    </form>
    
    <div class="auth-links">
        Đã có tài khoản? <a th:href="@{/login}">Đăng nhập ngay</a>
    </div>
</div>

</body>
</html>
